<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TIMEJAM - Multiplayer Offline Timer Game</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- TOP BAR -->
    <header id="top-bar">
      <div class="logo">TIMEJAM</div>
      <nav class="mode-tabs">
        <button class="mode-tab active" data-mode="sound">SOUND</button>
        <button class="mode-tab" data-mode="stop">STOP</button>
        <button class="mode-tab" data-mode="hold">HOLD</button>
      </nav>
      <div class="round-info">
        <span id="round-display">ROUND 1/3</span>
        <select id="round-select">
          <option value="3">3 Rds</option>
          <option value="5">5 Rds</option>
          <option value="7">7 Rds</option>
        </select>
      </div>
    </header>

    <!-- GAME AREA -->
    <main id="game-area">
      <!-- Player 1 Section -->
      <section id="player1" class="player-section p1">
        <div class="player-header">
          <span class="player-label" contenteditable="true" spellcheck="false" maxlength="10">PLAYER 1</span>
          <div class="score-badge" id="score-p1">0</div>
        </div>
        <div class="game-content" id="content-p1">
          <!-- Dynamically populated by JS -->
        </div>
        <div class="player-status" id="status-p1">Ready!</div>
      </section>

      <!-- Divider -->
      <div id="divider">
        <div id="divider-content">
          <div id="shared-display" class="vs-badge">VS</div>
        </div>
      </div>

      <!-- Player 2 Section -->
      <section id="player2" class="player-section p2">
        <div class="player-header">
          <span class="player-label" contenteditable="true" spellcheck="false" maxlength="10">PLAYER 2</span>
          <div class="score-badge" id="score-p2">0</div>
        </div>
        <div class="game-content" id="content-p2">
          <!-- Dynamically populated by JS -->
        </div>
        <div class="player-status" id="status-p2">Ready!</div>
      </section>
    </main>

    <!-- BOTTOM BAR -->
    <footer id="bottom-bar">
      <button id="main-action-btn" class="action-btn">START ROUND</button>
    </footer>

    <!-- OVERLAYS -->
    <div id="countdown-overlay" class="hidden">
      <div id="countdown-text">3</div>
    </div>

    <div id="reveal-overlay" class="hidden">
      <div class="reveal-panel">
        <h2 id="reveal-title">HASIL RONDE</h2>
        <div id="reveal-target" class="reveal-target">TARGET: 5.30s</div>
        <div class="reveal-scores">
          <div class="reveal-p1">
            <span class="reveal-name">P1</span>: <span id="reveal-val-p1">5.10s</span>
            <div id="reveal-diff-p1" class="reveal-diff">selisih: 0.20s</div>
            <div id="reveal-res-p1" class="reveal-res"></div>
          </div>
          <div class="reveal-p2">
            <span class="reveal-name">P2</span>: <span id="reveal-val-p2">4.70s</span>
            <div id="reveal-diff-p2" class="reveal-diff">selisih: 0.60s</div>
            <div id="reveal-res-p2" class="reveal-res"></div>
          </div>
        </div>
        <div class="reveal-footer">
          <button id="next-round-btn" class="action-btn secondary">LANJUT RONDE</button>
        </div>
      </div>
    </div>

    <!-- WIN SCREEN OVERLAY -->
    <div id="win-screen" class="hidden">
      <div class="win-panel">
        <h1 id="win-title">PLAYER 1 MENANG!</h1>
        <div class="final-score">
          <span id="win-score-p1" class="p1-text">3</span>
          <span class="vs-text">-</span>
          <span id="win-score-p2" class="p2-text">1</span>
        </div>
        <div class="win-actions">
          <button id="play-again-btn" class="action-btn">PLAY AGAIN</button>
          <button id="main-menu-btn" class="action-btn secondary">MAIN MENU</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
